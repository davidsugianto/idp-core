services:
  postgres:
    image: postgres:15-alpine
    container_name: idp-core-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: idp_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: idp-core-app
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=idp_core
      - APP_ENV=development
    ports:
      - "8989:8989"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: air -c .air.toml

volumes:
  postgres_data:
