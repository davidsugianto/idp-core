apiVersion: v1
kind: Service
metadata:
  name: idp-core
  namespace: idp-core
  labels:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api-server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api-server
---
# Headless service for StatefulSet (if needed)
apiVersion: v1
kind: Service
metadata:
  name: idp-core-headless
  namespace: idp-core
  labels:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api-server
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: idp-core
    app.kubernetes.io/component: api-server
