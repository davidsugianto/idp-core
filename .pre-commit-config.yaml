repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: gofmt -l -w
        language: system
        files: \.go$
        pass_filenames: true

      - id: go-imports
        name: go imports
        entry: goimports -l -w -local github.com/davidsugianto/idp-core
        language: system
        files: \.go$
        pass_filenames: true

      - id: go-mod-tidy
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test -short ./...
        language: system
        pass_filenames: false
