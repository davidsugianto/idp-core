server:
  port: 8989

cron:
  grace_timeout: "900s"
  schedules:
    ping: "*/5 * * * *"
    cost-sync: "0 * * * *"
  port: 8983

database:
  host: localhost      # Use localhost for local dev, Docker overrides with DB_HOST
  port: 5432
  user: postgres
  password: postgres
  name: idp_core
  sslmode: disable

redis:
  master_name: "localhost"
  address: "localhost:26379"
  password: "redispassword"

auth:
  jwt_secret: "dev-secret-key-change-in-production"
  jwt_expiry: "24h"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://localhost:8989"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "PATCH"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"
    - "X-API-Key"
  allow_credentials: true

kubernetes:
  in_cluster: false
  kubeconfig_path: "~/.kube/config"

argocd:
  base_url: "http://argocd-server.argocd.svc.cluster.local:80"
  namespace: "argocd"
  token: ""

oidc:
  enabled: false
  issuer_url: ""
  client_id: ""
  client_secret: ""
  redirect_url: ""
  scopes:
    - openid
    - profile
    - email
    - groups
  groups_claim: "groups"
  admin_group: "platform-admins"

finops:
  enabled: false
  opencost:
    base_url: "http://opencost.opencost.svc.cluster.local:9003"
    poll_interval: "1h"
  prometheus:
    url: "http://prometheus-k8s.monitoring.svc.cluster.local:9090"

