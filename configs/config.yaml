server:
  port: 8989

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres
  name: idp_core
  sslmode: disable

auth:
  jwt_secret: "change-me-in-production"

cors:
  allowed_origins:
    - "http://localhost:3000"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"
  allow_credentials: true

kubernetes:
  in_cluster: false
  kubeconfig_path: "~/.kube/config"

argocd:
  base_url: "https://argocd.example.com"
  token: ""
